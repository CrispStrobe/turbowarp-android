name: Build apps (Manual)

on:
  workflow_dispatch:

jobs:
  build-android:
    name: Android (.apk)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout turbowarp-android
        uses: actions/checkout@v4
        with:
          path: turbowarp-android

      - name: Checkout sibling scratch-gui
        uses: actions/checkout@v4
        with:
          repository: CrispStrobe/scratch-gui
          ref: develop
          path: scratch-gui

      - name: Checkout sibling extensions
        uses: actions/checkout@v4
        with:
          repository: CrispStrobe/extensions
          ref: main
          path: extensions

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install scratch-gui deps
        working-directory: scratch-gui
        run: |
          npm install --ignore-scripts --no-audit --no-fund
          # micro:bit firmware download is skipped by --ignore-scripts; stub
          # the generated file so webpack can resolve the import.
          mkdir -p src/generated
          printf "module.exports = '';\n" > src/generated/microbit-hex-url.cjs

      - name: Build scratch-gui (CI=true to suppress progress flood)
        working-directory: scratch-gui
        env:
          NODE_ENV: production
          CI: "true"
          NODE_OPTIONS: --max-old-space-size=8192
        run: ./node_modules/.bin/webpack --bail

      - name: Install turbowarp-android deps
        working-directory: turbowarp-android
        run: npm install --no-audit --no-fund

      - name: Capacitor sync (android)
        working-directory: turbowarp-android
        run: npx cap sync android

      - name: Build APK
        working-directory: turbowarp-android/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: turbowarp-android-apk
          path: turbowarp-android/android/app/build/outputs/apk/release/*.apk

  build-ios:
    name: iOS (.app, .ipa)
    runs-on: macos-latest
    steps:
      - name: Checkout turbowarp-android
        uses: actions/checkout@v4
        with:
          path: turbowarp-android

      - name: Checkout sibling scratch-gui
        uses: actions/checkout@v4
        with:
          repository: CrispStrobe/scratch-gui
          ref: develop
          path: scratch-gui

      - name: Checkout sibling extensions
        uses: actions/checkout@v4
        with:
          repository: CrispStrobe/extensions
          ref: main
          path: extensions

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install scratch-gui deps
        working-directory: scratch-gui
        run: |
          npm install --ignore-scripts --no-audit --no-fund
          mkdir -p src/generated
          printf "module.exports = '';\n" > src/generated/microbit-hex-url.cjs

      - name: Build scratch-gui
        working-directory: scratch-gui
        env:
          NODE_ENV: production
          CI: "true"
          NODE_OPTIONS: --max-old-space-size=8192
        run: ./node_modules/.bin/webpack --bail

      - name: Install turbowarp-android deps
        working-directory: turbowarp-android
        run: npm install --no-audit --no-fund

      - name: Capacitor sync (ios)
        working-directory: turbowarp-android
        run: npx cap sync ios

      - name: Build iOS app (unsigned, device SDK)
        working-directory: turbowarp-android/ios/App
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -target App \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build \
            build

      - name: Wrap App.app into unsigned .ipa
        working-directory: turbowarp-android/ios/App/build/Build/Products/Release-iphoneos
        run: |
          mkdir -p Payload
          cp -R App.app Payload/
          zip -r ../../../../TurboWarp-unsigned.ipa Payload
          ls -lh ../../../../TurboWarp-unsigned.ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: turbowarp-ios-ipa
          path: turbowarp-android/ios/App/TurboWarp-unsigned.ipa
